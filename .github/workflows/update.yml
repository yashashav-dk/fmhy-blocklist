name: Update Blocklist

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    paths:
      - "main.go"
      - "go.mod"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build scraper
        run: go build -ldflags="-s -w" -o fmhy-blocklist .

      - name: Run scraper
        run: ./fmhy-blocklist

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blocklist.txt domains.txt stats.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update blocklist $(date -u +%Y-%m-%d)"
            git push
          fi
